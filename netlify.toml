# Netlify configuration — Prophecy & Persia
# This is a fully static site: no build step required.

[build]
  publish = "."
  command = ""

# Long-cache the heavy, content-hashed assets (posters, images, fonts)
[[headers]]
  for = "/assets/posters/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
